name: Daily ingest

on:
  # Run every day at 11:00 UTC (~6am US Central). Adjust as you like.
  schedule:
    - cron: "0 11 * * *"
  # Also allow manual triggering from the Actions tab
  workflow_dispatch:

# Allow the workflow to commit back to the repo
permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    env:
      # Opt in to Node 24 now (Node 20 is being deprecated in June 2026)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily ingest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/run_daily.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pending.json data/investments.json data/seen_urls.json data/geocode_cache.json || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily ingest"
            git push
          fi
